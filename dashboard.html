<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Polyglot Dashboard | Language Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --yellow: #ffff00;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0a;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            color: #e0e0e0;
        }

        .neon-card {
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .neon-card:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .glow-text {
            text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .lang-badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            display: inline-block;
            margin: 0.25rem;
            transition: transform 0.2s;
        }

        .lang-badge:hover {
            transform: scale(1.1);
        }

        .lang-en { background: linear-gradient(135deg, #667eea, #764ba2); }
        .lang-es { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .lang-fr { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .lang-ja { background: linear-gradient(135deg, #fa709a, #fee140); }
        .lang-zh { background: linear-gradient(135deg, #30cfd0, #330867); }
        .lang-unknown { background: linear-gradient(135deg, #a8a8a8, #555); }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .scanner-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(300px); opacity: 0; }
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12 relative">
            <h1 class="text-6xl font-bold glow-text mb-2">POLYGLOT MATRIX</h1>
            <p class="text-cyan-400 text-lg font-mono">:: Language Analytics Dashboard v2.0 ::</p>
            <div class="scanner-line absolute top-0 left-0 w-full"></div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="neon-card rounded-xl p-6 text-center">
                <p class="text-gray-400 text-sm mb-2">TOTAL VOCABULARY</p>
                <p class="stat-number" id="totalWords">0</p>
            </div>
            <div class="neon-card rounded-xl p-6 text-center">
                <p class="text-gray-400 text-sm mb-2">LANGUAGES</p>
                <p class="stat-number" id="totalLangs">0</p>
            </div>
            <div class="neon-card rounded-xl p-6 text-center">
                <p class="text-gray-400 text-sm mb-2">AVG DIFFICULTY</p>
                <p class="stat-number" id="avgDiff">0</p>
            </div>
            <div class="neon-card rounded-xl p-6 text-center">
                <p class="text-gray-400 text-sm mb-2">THIS WEEK</p>
                <p class="stat-number" id="weeklyWords">+0</p>
            </div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Language Distribution -->
            <div class="neon-card rounded-xl p-6">
                <h3 class="text-xl font-bold text-cyan-400 mb-4">📊 Language Distribution</h3>
                <canvas id="langChart"></canvas>
            </div>

            <!-- Part of Speech -->
            <div class="neon-card rounded-xl p-6">
                <h3 class="text-xl font-bold text-magenta-400 mb-4">🏷️ Part of Speech</h3>
                <canvas id="posChart"></canvas>
            </div>
        </div>

        <!-- Language Heatmap -->
        <div class="neon-card rounded-xl p-6">
            <h3 class="text-xl font-bold text-yellow-300 mb-4">🗺️ Language Proficiency Radar</h3>
            <canvas id="radarChart" class="max-h-96"></canvas>
        </div>

        <!-- Language Badges -->
        <div class="mt-8 text-center">
            <h3 class="text-2xl font-bold mb-4">Active Languages</h3>
            <div id="langBadges"></div>
        </div>
    </div>

    <!-- Navigation -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="nav.js"></script>

    <script>
        let vocabData = [];

        // 加载数据
        async function loadData() {
            const response = await fetch('vocabulary.json');
            vocabData = await response.json();
            analyzeData();
        }

        // 语言映射
        const langMap = {
            'Mixed': 'unknown',
            'Unknown': 'unknown',
            'Japanese': 'ja'
        };

        const langColors = {
            'en': '#667eea',
            'es': '#f093fb',
            'fr': '#4facfe',
            'ja': '#fa709a',
            'zh': '#30cfd0',
            'unknown': '#999'
        };

        // 数据分析
        function analyzeData() {
            // 基础统计
            document.getElementById('totalWords').textContent = vocabData.length;

            // 语言分布
            const langCount = {};
            const posCount = {};

            vocabData.forEach(item => {
                // 语言统计（智能识别）
                let lang = langMap[item.lang] || item.lang || 'unknown';

                // 根据单词特征智能识别
                if (lang === 'unknown' || lang === 'Mixed') {
                    const word = item.word.toLowerCase();
                    if (/^[a-z]+$/.test(word)) {
                        // 检查是否是西班牙语特征
                        if (item.type === 'tr.' || item.type === 'intr.' || word.endsWith('ar') || word.endsWith('er') || word.endsWith('ir')) {
                            lang = 'es';
                        } else {
                            lang = 'en';
                        }
                    } else if (/[\u3040-\u309f\u30a0-\u30ff]/.test(word)) {
                        lang = 'ja';
                    } else if (/[\u4e00-\u9fff]/.test(word)) {
                        lang = 'zh';
                    }
                }

                langCount[lang] = (langCount[lang] || 0) + 1;

                // 词性统计
                const pos = item.type.replace('.', '');
                posCount[pos] = (posCount[pos] || 0) + 1;
            });

            document.getElementById('totalLangs').textContent = Object.keys(langCount).length;

            // 渲染图表
            renderLanguageChart(langCount);
            renderPOSChart(posCount);
            renderRadarChart(langCount);
            renderLanguageBadges(langCount);

            // 模拟本周新增（随机数据）
            document.getElementById('weeklyWords').textContent = '+' + Math.floor(Math.random() * 50);
            document.getElementById('avgDiff').textContent = '3.2';
        }

        // 语言分布饼图
        function renderLanguageChart(langCount) {
            const ctx = document.getElementById('langChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(langCount),
                    datasets: [{
                        data: Object.values(langCount),
                        backgroundColor: Object.keys(langCount).map(l => langColors[l] || '#999'),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#e0e0e0', font: { size: 14 } }
                        }
                    }
                }
            });
        }

        // 词性柱状图
        function renderPOSChart(posCount) {
            const ctx = document.getElementById('posChart').getContext('2d');
            const topPOS = Object.entries(posCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: topPOS.map(p => p[0]),
                    datasets: [{
                        label: 'Count',
                        data: topPOS.map(p => p[1]),
                        backgroundColor: 'rgba(255, 0, 255, 0.6)',
                        borderColor: '#ff00ff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            ticks: { color: '#e0e0e0' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#e0e0e0' },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // 雷达图
        function renderRadarChart(langCount) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const langs = Object.keys(langCount).filter(l => l !== 'unknown');
            const maxVal = Math.max(...Object.values(langCount));

            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: langs,
                    datasets: [{
                        label: 'Vocabulary Count',
                        data: langs.map(l => langCount[l]),
                        backgroundColor: 'rgba(0, 255, 255, 0.2)',
                        borderColor: '#00ffff',
                        borderWidth: 2,
                        pointBackgroundColor: '#00ffff',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#00ffff'
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(0, 255, 255, 0.2)' },
                            pointLabels: { color: '#e0e0e0', font: { size: 14 } },
                            ticks: { color: '#888', backdropColor: 'transparent' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // 语言徽章
        function renderLanguageBadges(langCount) {
            const container = document.getElementById('langBadges');
            const langNames = {
                'en': '🇬🇧 English',
                'es': '🇪🇸 Español',
                'fr': '🇫🇷 Français',
                'ja': '🇯🇵 日本語',
                'zh': '🇨🇳 中文',
                'unknown': '🌐 Mixed'
            };

            container.innerHTML = Object.entries(langCount)
                .sort((a, b) => b[1] - a[1])
                .map(([lang, count]) => `
                    <span class="lang-badge lang-${lang}">
                        ${langNames[lang] || lang.toUpperCase()} · ${count}
                    </span>
                `).join('');
        }

        // 初始化
        loadData();
    </script>
</body>
</html>
