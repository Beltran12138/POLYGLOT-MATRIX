<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polyglot Matrix · 九语学习史</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{--navy:#1B2A5A;--gold:#C9A24C;--ink:#1a1a1a;--paper:#fbfaf7;--line:#e3ddd0;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Georgia","Songti SC",serif;line-height:1.5;padding:48px 24px;max-width:1080px;margin:0 auto}
  header{border-bottom:3px solid var(--navy);padding-bottom:16px;margin-bottom:8px}
  h1{font-size:34px;color:var(--navy);letter-spacing:-.5px;font-weight:700}
  .sub{color:#6b6453;font-size:14px;margin-top:6px;font-family:system-ui,sans-serif}
  h2{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);
     font-family:system-ui,sans-serif;font-weight:700;margin:44px 0 14px;border-left:4px solid var(--gold);padding-left:10px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:32px}
  .stat{display:flex;align-items:baseline;gap:8px;margin:4px 0;font-family:system-ui,sans-serif}
  .stat .n{font-size:22px;color:var(--navy);font-weight:700;min-width:64px;text-align:right}
  .stat .bar{height:14px;background:var(--navy);opacity:.85}
  .stat .lab{font-size:14px;color:#444}
  .cog{border:1px solid var(--line);padding:10px 12px;margin:8px 0;background:#fff}
  .cog .meaning{font-size:15px;color:var(--navy);font-weight:700;margin-bottom:4px}
  .cog .w{display:inline-block;font-family:system-ui,sans-serif;font-size:13px;margin:2px 8px 2px 0;color:#333}
  .cog .w b{color:var(--gold)}
  .note{font-family:system-ui,sans-serif;font-size:12px;color:#8a8270;margin-top:6px}
  canvas{background:#fff;border:1px solid var(--line);padding:8px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>九语学习史</h1>
  <div class="sub" id="sub"></div>
</header>

<h2>语言分布 · Language Distribution</h2>
<div id="dist"></div>

<h2>词性分布 · Part of Speech</h2>
<canvas id="pos" height="110"></canvas>
<div class="note">名/动/形/副等词性占比。</div>

<h2>跨语言同源词 · Cognate Clusters</h2>
<div id="cog"></div>

<script>
const D = {"total": 14116, "dist": [{"lang": "English", "iso": "en", "n": 12262}, {"lang": "Français", "iso": "fr", "n": 863}, {"lang": "Español", "iso": "es", "n": 677}, {"lang": "粵語", "iso": "yue", "n": 299}, {"lang": "Nederlands", "iso": "nl", "n": 8}, {"lang": "Ελληνικά", "iso": "el", "n": 4}, {"lang": "Bahasa", "iso": "id", "n": 2}, {"lang": "la", "iso": "la", "n": 1}], "pos": [{"t": "n", "n": 6124}, {"t": "adj", "n": 3292}, {"t": "v", "n": 2853}, {"t": "N", "n": 937}, {"t": "adv", "n": 216}, {"t": "f", "n": 136}, {"t": "m", "n": 134}, {"t": "tr", "n": 103}, {"t": "intr", "n": 32}, {"t": "sth", "n": 32}, {"t": "prnl", "n": 28}, {"t": "sb", "n": 19}], "cognates": [{"def": "攀登", "words": [{"iso": "en", "lang": "English", "word": "ascend"}, {"iso": "en", "lang": "English", "word": "clamber"}, {"iso": "es", "lang": "Español", "word": "trepar"}, {"iso": "fr", "lang": "Français", "word": "gravir"}, {"iso": "fr", "lang": "Français", "word": "monter"}]}, {"def": "偷窃", "words": [{"iso": "en", "lang": "English", "word": "filch"}, {"iso": "es", "lang": "Español", "word": "robar"}, {"iso": "fr", "lang": "Français", "word": "cambrioler"}]}, {"def": "开始", "words": [{"iso": "en", "lang": "English", "word": "embark"}, {"iso": "es", "lang": "Español", "word": "comenzaron"}, {"iso": "fr", "lang": "Français", "word": "commencer"}]}, {"def": "平衡", "words": [{"iso": "en", "lang": "English", "word": "equilibrium"}, {"iso": "en", "lang": "English", "word": "stasis"}, {"iso": "es", "lang": "Español", "word": "equilibrio"}, {"iso": "fr", "lang": "Français", "word": "equilibrer"}]}, {"def": "爆炸", "words": [{"iso": "en", "lang": "English", "word": "blast"}, {"iso": "en", "lang": "English", "word": "blow"}, {"iso": "es", "lang": "Español", "word": "estallar"}, {"iso": "fr", "lang": "Français", "word": "exploser"}]}, {"def": "神圣的", "words": [{"iso": "en", "lang": "English", "word": "hallowed"}, {"iso": "en", "lang": "English", "word": "inviolable"}, {"iso": "en", "lang": "English", "word": "saint"}, {"iso": "es", "lang": "Español", "word": "sagrado"}, {"iso": "fr", "lang": "Français", "word": "sacre"}]}, {"def": "坚持", "words": [{"iso": "en", "lang": "English", "word": "Persevere"}, {"iso": "en", "lang": "English", "word": "assert"}, {"iso": "es", "lang": "Español", "word": "persistir"}, {"iso": "fr", "lang": "Français", "word": "mentener"}]}, {"def": "恢复", "words": [{"iso": "en", "lang": "English", "word": "rehabilitation"}, {"iso": "es", "lang": "Español", "word": "recobrar"}, {"iso": "fr", "lang": "Français", "word": "relever"}]}, {"def": "放弃", "words": [{"iso": "en", "lang": "English", "word": "abnegate"}, {"iso": "en", "lang": "English", "word": "waive"}, {"iso": "es", "lang": "Español", "word": "renunciar"}, {"iso": "fr", "lang": "Français", "word": "renoncer"}]}, {"def": "忍受", "words": [{"iso": "en", "lang": "English", "word": "withstand"}, {"iso": "es", "lang": "Español", "word": "subir"}, {"iso": "fr", "lang": "Français", "word": "souffrir"}]}, {"def": "you", "words": [{"iso": "es", "lang": "Español", "word": "contigo=to"}, {"iso": "fr", "lang": "Français", "word": "merci=thank"}, {"iso": "yue", "lang": "粵語", "word": "唔洗啦=thank"}]}, {"def": "命令", "words": [{"iso": "en", "lang": "English", "word": "behest"}, {"iso": "en", "lang": "English", "word": "decree"}, {"iso": "en", "lang": "English", "word": "prescribe"}, {"iso": "es", "lang": "Español", "word": "orden"}, {"iso": "fr", "lang": "Français", "word": "prescrire"}]}, {"def": "给予", "words": [{"iso": "en", "lang": "English", "word": "accord"}, {"iso": "en", "lang": "English", "word": "allocation"}, {"iso": "en", "lang": "English", "word": "bestow"}, {"iso": "es", "lang": "Español", "word": "reportar"}, {"iso": "fr", "lang": "Français", "word": "rendre"}]}], "conf_low": 13, "langnames": {"en": "English", "es": "Español", "fr": "Français", "yue": "粵語", "el": "Ελληνικά", "nl": "Nederlands", "id": "Bahasa", "ja": "日本語", "ar": "العربية", "zh": "中文"}};
document.getElementById('sub').textContent =
  D.total.toLocaleString()+' 词条 · '+D.dist.length+' 种语言 · '+D.eps.length+' 集 · 低信心 '+D.conf_low;

// 分布条
const max = D.dist[0].n;
document.getElementById('dist').innerHTML = D.dist.map(r=>
  `<div class="stat"><span class="n">${r.n.toLocaleString()}</span>`+
  `<span class="bar" style="width:${Math.max(2,r.n/max*420)}px"></span>`+
  `<span class="lab">${r.lang} <small style="color:#aaa">(${r.iso})</small></span></div>`
).join('');

// 词性分布(横向条)
new Chart(document.getElementById('pos'),{
  type:'bar',
  data:{labels:D.pos.map(p=>p.t),
    datasets:[{data:D.pos.map(p=>p.n),backgroundColor:'#1B2A5A',borderColor:'#C9A24C',borderWidth:1}]},
  options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},
    scales:{x:{grid:{color:'#eee'}},y:{grid:{display:false},ticks:{font:{family:'system-ui',size:11}}}}}
});

// 同源词
document.getElementById('cog').innerHTML = D.cognates.map(c=>
  `<div class="cog"><div class="meaning">${c.def}</div>`+
  c.words.map(w=>`<span class="w"><b>${w.word}</b> ${w.lang}</span>`).join('')+
  `</div>`
).join('') || '<div class="note">无足够跨语言同义簇</div>';
</script>
</body>
</html>
