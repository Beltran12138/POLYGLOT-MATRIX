<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Polyglot Matrix | Neural Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-green: #0f0;
            --neon-red: #f00;
            --neon-blue: #00f3ff;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Share Tech Mono', 'Noto Sans SC', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .glitch-text {
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px 0px #f00, -2px -2px 0px #0ff; }
            95% { text-shadow: 2px 2px 0px #f00, -2px -2px 0px #0ff; }
            96% { text-shadow: none; }
            98% { text-shadow: -2px 2px 0px #f00, 2px -2px 0px #0ff; }
            100% { text-shadow: 2px 2px 0px #f00, -2px -2px 0px #0ff; }
        }

        .quiz-card {
            background: rgba(10, 15, 20, 0.85);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .option-btn {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(0, 243, 255, 0.15);
            border-color: var(--neon-blue);
            transform: translateX(10px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .option-btn.correct {
            background: rgba(0, 255, 0, 0.2) !important;
            border-color: var(--neon-green) !important;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .option-btn.wrong {
            background: rgba(255, 0, 0, 0.2) !important;
            border-color: var(--neon-red) !important;
            box-shadow: 0 0 20px var(--neon-red);
        }

        .streak-counter {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Matrix Rain Canvas */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .progress-bar {
            width: 0%;
            height: 4px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <canvas id="matrixCanvas"></canvas>

    <!-- Navigation -->
    <script src="nav.js"></script>

    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center mb-8 p-4 border-b border-cyan-900/50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-cyan-500 hover:text-cyan-300 transition"><i class="fa-solid fa-arrow-left"></i> HUB</a>
            <h1 class="text-2xl md:text-4xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 glitch-text">
                NEURAL QUIZ
            </h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-center">
                <p class="text-xs text-gray-500 uppercase tracking-widest">Streak</p>
                <p id="streak" class="text-3xl font-bold text-cyan-400 streak-counter">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs text-gray-500 uppercase tracking-widest">Score</p>
                <p id="score" class="text-3xl font-bold text-white streak-counter">0</p>
            </div>
        </div>
    </header>

    <!-- Loading State -->
    <div id="loading" class="text-cyan-400 text-xl animate-pulse">
        <i class="fa-solid fa-circle-notch fa-spin"></i> INITIALIZING NEURAL LINK...
    </div>

    <!-- Quiz Container -->
    <main id="quizContainer" class="hidden w-full max-w-2xl relative">
        <!-- Timer Bar -->
        <div class="w-full bg-gray-900 h-1 mb-4 rounded-full overflow-hidden">
            <div id="timerBar" class="progress-bar"></div>
        </div>

        <div class="quiz-card rounded-2xl p-8 md:p-12 relative overflow-hidden">
            <!-- Background Deco -->
            <div class="absolute top-0 right-0 p-4 opacity-20 text-cyan-500 text-6xl">
                <i class="fa-solid fa-brain"></i>
            </div>

            <!-- Question Area -->
            <div class="mb-10 relative z-10">
                <div class="flex justify-between items-start mb-4">
                    <span id="qLang" class="px-2 py-1 text-xs border border-cyan-500/30 rounded text-cyan-400 uppercase tracking-wider">UNKNOWN</span>
                    <span id="qType" class="text-gray-500 text-sm font-mono">n.</span>
                </div>
                <h2 id="qWord" class="text-5xl md:text-6xl font-bold text-white mb-6 tracking-tight break-words">Loading...</h2>
                <div class="h-px w-20 bg-gradient-to-r from-cyan-500 to-transparent"></div>
            </div>

            <!-- Options Grid -->
            <div id="optionsGrid" class="grid grid-cols-1 gap-4 relative z-10">
                <!-- Options will be injected here -->
            </div>
        </div>

        <!-- Feedback Overlay (Hidden by default) -->
        <div id="feedback" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300 z-50">
            <div class="text-6xl font-bold drop-shadow-lg transform scale-150 transition-transform duration-300" id="feedbackIcon">
                <!-- ✅ or ❌ -->
            </div>
        </div>
    </main>

    <!-- Game Over Screen -->
    <div id="gameOver" class="hidden text-center max-w-lg">
        <div class="quiz-card p-10 rounded-2xl">
            <h2 class="text-4xl font-bold text-red-500 mb-4">SYSTEM FAILURE</h2>
            <p class="text-gray-400 mb-8">Neural link disconnected. Analysis complete.</p>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-gray-900/50 p-4 rounded">
                    <p class="text-xs text-gray-500">FINAL SCORE</p>
                    <p id="finalScore" class="text-3xl text-white font-bold">0</p>
                </div>
                <div class="bg-gray-900/50 p-4 rounded">
                    <p class="text-xs text-gray-500">MAX STREAK</p>
                    <p id="finalStreak" class="text-3xl text-cyan-400 font-bold">0</p>
                </div>
            </div>

            <button onclick="initGame()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl transition shadow-[0_0_20px_rgba(8,145,178,0.5)]">
                <i class="fa-solid fa-power-off mr-2"></i> REBOOT SYSTEM
            </button>
        </div>
    </div>

    <script>
        // Matrix Rain Effect
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width/fontSize;
        const rainDrops = Array.from({ length: columns }).fill(1);

        const draw = () => {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };
        setInterval(draw, 30);

        // --- Quiz Logic ---
        
        let vocabData = [];
        let currentQuestion = null;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let timeLeft = 100;
        let timerInterval;
        let isGameActive = false;

        async function loadData() {
            try {
                const response = await fetch('vocabulary.json');
                vocabData = await response.json();
                
                // Filter out bad data if possible
                vocabData = vocabData.filter(v => v.word && v.def && v.def.length > 2);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('quizContainer').classList.remove('hidden');
                initGame();
            } catch (error) {
                console.error("Failed to load data", error);
                document.getElementById('loading').innerText = "SYSTEM ERROR: DATA CORRUPTION";
            }
        }

        function initGame() {
            score = 0;
            streak = 0;
            maxStreak = 0;
            updateStats();
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('quizContainer').classList.remove('hidden');
            isGameActive = true;
            nextQuestion();
        }

        function nextQuestion() {
            if (!isGameActive) return;

            // Reset Timer
            clearInterval(timerInterval);
            timeLeft = 100; // 100%
            startTimer();

            // Pick a random word
            const correctIndex = Math.floor(Math.random() * vocabData.length);
            const correctWord = vocabData[correctIndex];

            // Pick 3 distractors
            // Strategy: Try to find words with same Type (POS) first, fallback to random
            const distractors = [];
            let attempts = 0;
            const sameTypePool = vocabData.filter(v => v.type === correctWord.type && v.word !== correctWord.word);
            
            while(distractors.length < 3 && attempts < 100) {
                attempts++;
                let candidate;
                
                // 70% chance to pick from same type if available
                if (sameTypePool.length > 10 && Math.random() > 0.3) {
                     const idx = Math.floor(Math.random() * sameTypePool.length);
                     candidate = sameTypePool[idx];
                } else {
                    // Random fallback
                    const idx = Math.floor(Math.random() * vocabData.length);
                    candidate = vocabData[idx];
                }

                if(candidate.word !== correctWord.word && !distractors.some(d => d.word === candidate.word)) {
                    distractors.push(candidate);
                }
            }

            // Shuffle options
            const options = [correctWord, ...distractors].sort(() => Math.random() - 0.5);

            currentQuestion = {
                word: correctWord,
                options: options
            };

            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuestion.word;
            document.getElementById('qWord').textContent = q.word;
            document.getElementById('qLang').textContent = q.lang === 'unknown' ? '???' : q.lang;
            document.getElementById('qType').textContent = q.type;

            const optionsContainer = document.getElementById('optionsGrid');
            optionsContainer.innerHTML = '';

            currentQuestion.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-lg text-gray-300 hover:text-white font-mono text-sm md:text-base group';
                
                // Clean definition for display
                const cleanDef = opt.def.split('&')[0].substring(0, 50);
                
                btn.innerHTML = `<span class="text-cyan-500 mr-2 opacity-50 group-hover:opacity-100">></span> ${cleanDef}`;
                // Store the word directly on the button for validation
                btn.dataset.word = opt.word;
                btn.onclick = () => handleAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selected, btnElement) {
            if (!isGameActive) return;
            
            clearInterval(timerInterval);
            const isCorrect = selected.word === currentQuestion.word.word;
            
            // Disable all buttons
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                btnElement.classList.add('correct');
                score += 10 + (streak * 2);
                streak++;
                if(streak > maxStreak) maxStreak = streak;
                showFeedback(true);
                setTimeout(nextQuestion, 1000);
            } else {
                btnElement.classList.add('wrong');
                // Highlight correct one using robust checking
                buttons.forEach(b => {
                    if (b.dataset.word === currentQuestion.word.word) {
                        b.classList.add('correct');
                    }
                });
                streak = 0;
                showFeedback(false);
                setTimeout(endGame, 1500);
            }
            updateStats();
        }

        function showFeedback(isCorrect) {
            const feedback = document.getElementById('feedback');
            const icon = document.getElementById('feedbackIcon');
            feedback.classList.remove('opacity-0');
            icon.innerHTML = isCorrect ? '<span class="text-green-500">✅</span>' : '<span class="text-red-500">❌</span>';
            setTimeout(() => {
                feedback.classList.add('opacity-0');
            }, 800);
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
        }

        function startTimer() {
            const bar = document.getElementById('timerBar');
            timerInterval = setInterval(() => {
                timeLeft -= 0.5; // Controls speed
                bar.style.width = timeLeft + '%';
                
                if(timeLeft <= 30) bar.style.background = '#f00';
                else bar.style.background = '#00f3ff';

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    streak = 0;
                    endGame();
                }
            }, 50);
        }

        function endGame() {
            isGameActive = false;
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('gameOver').classList.remove('hidden');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('finalStreak').innerText = maxStreak;
        }

        // Start
        loadData();

    </script>
</body>
</html>
